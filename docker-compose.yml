version: '3.8'

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=False
      - DATABASE_URL=sqlite:///data/database.db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/jobs || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    build: .
    command: bash -lc ".venv/bin/celery -A app.tasks.celery_app worker --loglevel=info -c 1 -n worker@%h"
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - redis
      - web
    environment:
      - REDIS_URL=redis://redis:6379/0

  tester:
    build: .
    command: bash -lc "./scripts/wait_for_service.sh http://web:5000/api/jobs 120 && python scripts/e2e_test.py"
    depends_on:
      - web
      - worker
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - REDIS_URL=redis://redis:6379/0
